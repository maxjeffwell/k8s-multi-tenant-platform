apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-backend-sa
  namespace: multi-tenant-platform
  labels:
    app: platform-backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-backend-role
rules:
- apiGroups: [""]
  # configmaps + secrets needed for self-hosted Neon branching:
  # - tenantflow-neon-tenant-map (tenant→IDs persistence)
  # - per-branch <compute>-spec ConfigMap (spec.json)
  # - per-branch <compute>-creds Secret (random password)
  resources: ["namespaces", "services", "pods", "resourcequotas", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "scale"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingressclasses"]
  # Read-only — pre-flight check verifies the cluster's ingress controller
  # exists before creating tenant resources that depend on it.
  verbs: ["get", "list"]
- apiGroups: ["traefik.io", "traefik.containo.us"]
  # Tenants get Traefik IngressRoutes (REST or GraphQL paths) + Middlewares;
  # backend creates them per-tenant alongside Deployments/Services.
  resources: ["ingressroutes", "middlewares", "tlsoptions", "traefikservices"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-backend-binding
subjects:
- kind: ServiceAccount
  name: platform-backend-sa
  namespace: multi-tenant-platform
roleRef:
  kind: ClusterRole
  name: platform-backend-role
  apiGroup: rbac.authorization.k8s.io
